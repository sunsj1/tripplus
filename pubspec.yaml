name: tripplus
description: "AI Highway Companion for Indian road trips"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Code Generation (runtime)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  fpdart: ^1.1.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Location
  geolocator: ^13.0.2

  # Google Maps
  google_maps_flutter: ^2.10.0

  # Environment
  flutter_dotenv: ^5.2.1

  # Logging
  logger: ^2.5.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_crashlytics: ^5.0.0
  cloud_firestore: ^6.2.0
  google_sign_in: ^7.2.0
  intl_phone_field: ^3.2.0
  phone_numbers_parser: ^9.0.21
  permission_handler: ^12.0.1

  # Notifications & connectivity (Phase 1 alerts engine)
  flutter_local_notifications: ^17.2.4
  connectivity_plus: ^6.1.0

  # P2-052 — OS share sheet for trips
  share_plus: ^11.0.0
  # P2-060 — load bundled hidden-gem corridor dataset
  # (no extra dep needed — uses flutter/services rootBundle)

  # Unique ID generation (Trip IDs)
  uuid: ^4.5.1

  # Deep links (emergency dial, external maps)
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation (build-time)
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - .env
    # P2-060 — bundled hidden-gem corridor dataset
    - assets/hidden_gems/corridor_gems.json
