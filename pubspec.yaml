name: journeyplus
description: "AI Highway Companion for Indian road trips"
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Code Generation (runtime)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  fpdart: ^1.1.0
  image_picker: ^1.1.2
  image_picker_android: ^0.8.13
  image_picker_platform_interface: ^2.11.0
  flutter_image_compress: ^2.3.0

  # Location
  geolocator: ^13.0.2

  # Google Maps
  google_maps_flutter: ^2.10.0

  # Environment
  flutter_dotenv: ^5.2.1

  # Logging
  logger: ^2.5.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_crashlytics: ^5.0.0
  cloud_firestore: ^6.2.0
  google_sign_in: ^7.2.0
  intl_phone_field: ^3.2.0
  phone_numbers_parser: ^9.0.21
  permission_handler: ^12.0.1

  # Notifications & connectivity (Phase 1 alerts engine)
  flutter_local_notifications: ^17.2.4
  connectivity_plus: ^6.1.0

  # P2-052 — OS share sheet for trips
  share_plus: ^11.0.0
  # P2-060 — load bundled hidden-gem corridor dataset
  # (no extra dep needed — uses flutter/services rootBundle)

  # Unique ID generation (Trip IDs)
  uuid: ^4.5.1

  # P2-073 — cached POI photo network images (Google Place photos)
  cached_network_image: ^3.4.1

  # Deep links (emergency dial, external maps)
  url_launcher: ^6.3.1

  # Legal pages (privacy, terms) from journeyplus.in
  webview_flutter: ^4.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation (build-time)
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

  # Brand assets — launcher icons & native splash (dart run …)
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - .env
    # P2-060 — bundled hidden-gem corridor dataset
    - assets/hidden_gems/corridor_gems.json
    # Brand identity (logos referenced by launcher/splash generators below)
    - assets/logo/
    - assets/logo/png/

# ── Launcher icon (source: assets/logo/png/) ──────────────────────────────────
# Regenerate: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo/png/app-icon-1024.png
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: assets/logo/png/logo-mark-512.png
  min_sdk_android: 21
  remove_alpha_ios: true

# ── Native splash (brand green + route mark) ─────────────────────────────────
# Regenerate: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#1B5E20"
  image: assets/logo/png/logo-mark-512.png
  android_12:
    color: "#1B5E20"
    image: assets/logo/png/logo-mark-512.png
  ios: true
  android: true
  web: false
